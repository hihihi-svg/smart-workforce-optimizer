<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - Smart Workforce Optimizer</title>
    <!-- Outfit Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Shared CSS Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .workload-slider-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .workload-val-display {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-primary);
            min-width: 3rem;
        }
        /* Custom Toast Notification */
        .toast {
            display: none;
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            z-index: 1000;
            box-shadow: var(--shadow-premium);
            backdrop-filter: blur(8px);
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Workforce Optimizer</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="employees.html" class="active">Employees</a>
            <a href="tasks.html">Tasks</a>
            <a href="search.html">Skill Search</a>
            <a href="optimization.html">Optimization</a>
            <a href="results.html">Results</a>
        </nav>
    </header>

    <div class="container">
        <div class="hero-section">
            <h1>Employee Management</h1>
            <p>View existing workforce profiles and add new employees to your resource pool.</p>
        </div>

        <div class="split-grid">
            <!-- Left Side: Add Employee Form -->
            <div class="glass-panel">
                <h2>👤 Add New Employee</h2>
                <form id="employee-form" onsubmit="handleAddEmployee(event)">
                    <div class="form-group">
                        <label for="emp-name">Employee Name</label>
                        <input type="text" id="emp-name" class="input-control" placeholder="e.g. Ramesh Kumar" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="emp-experience">Experience (Years)</label>
                        <input type="number" id="emp-experience" class="input-control" min="0" max="40" value="2" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="emp-workload">Current Workload (%)</label>
                        <div class="workload-slider-container">
                            <input type="range" id="emp-workload" class="input-control" min="0" max="100" value="30" oninput="updateWorkloadDisplay(this.value)">
                            <span class="workload-val-display" id="workload-display">30%</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="emp-skills">Skills (Comma-separated)</label>
                        <input type="text" id="emp-skills" class="input-control" placeholder="e.g. Python, ML, SQL" required>
                    </div>

                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Add Employee</button>
                </form>
            </div>

            <!-- Right Side: Employee list -->
            <div>
                <h2 style="margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center;">
                    Workforce Profiles
                    <span class="badge badge-primary" id="employees-count">0 Total</span>
                </h2>
                <div class="grid" id="employees-grid">
                    <!-- Dynamic rendering -->
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Component -->
    <div id="toast-notification" class="toast"></div>

    <footer>
        &copy; 2026 Smart Workforce Optimizer. Powered by custom DAA algorithms.
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            loadEmployees();
        });

        function updateWorkloadDisplay(val) {
            document.getElementById("workload-display").textContent = val + "%";
        }

        function showToast(message, type = "success") {
            const toast = document.getElementById("toast-notification");
            toast.textContent = message;
            if (type === "success") {
                toast.style.borderLeft = "4px solid var(--success)";
            } else {
                toast.style.borderLeft = "4px solid var(--danger)";
            }
            toast.style.display = "block";
            setTimeout(() => {
                toast.style.display = "none";
            }, 3000);
        }

        async function loadEmployees() {
            const grid = document.getElementById("employees-grid");
            const countBadge = document.getElementById("employees-count");
            
            try {
                const response = await fetch("http://localhost:8000/employees/");
                if (!response.ok) throw new Error("Failed to fetch employees");
                const employees = await response.json();
                
                countBadge.textContent = `${employees.length} Total`;

                if (employees.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <span class="empty-state-icon">👥</span>
                            <span>No employees added to the database yet.</span>
                        </div>
                    `;
                } else {
                    grid.innerHTML = employees.map(emp => {
                        // Workload color coding
                        let barColor = 'var(--success)';
                        if (emp.workload > 70) {
                            barColor = 'var(--danger)';
                        } else if (emp.workload > 40) {
                            barColor = 'var(--warning)';
                        }

                        const skillsHtml = emp.skills.map(s => `<span class="pill">${s}</span>`).join('');

                        return `
                            <div class="item-card">
                                <h3 class="item-title">${escapeHtml(emp.name)}</h3>
                                <div class="item-subtitle">${emp.experience} Year(s) Experience</div>
                                
                                <div class="progress-container">
                                    <div class="progress-label">
                                        <span>Current Workload</span>
                                        <span>${emp.workload}%</span>
                                    </div>
                                    <div class="progress-bar-bg">
                                        <div class="progress-bar-fill" style="width: ${emp.workload}%; background-color: ${barColor}"></div>
                                    </div>
                                </div>
                                
                                <div class="pill-container">
                                    ${skillsHtml}
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (err) {
                console.error(err);
                grid.innerHTML = `
                    <div class="empty-state" style="color: var(--danger);">
                        <span class="empty-state-icon">⚠️</span>
                        <span>Failed to connect to the backend server.</span>
                    </div>
                `;
            }
        }

        async function handleAddEmployee(event) {
            event.preventDefault();
            
            const name = document.getElementById("emp-name").value.trim();
            const exp = parseInt(document.getElementById("emp-experience").value);
            const workload = parseInt(document.getElementById("emp-workload").value);
            const skillsRaw = document.getElementById("emp-skills").value.trim();

            if (!name) return;

            const skills = skillsRaw.split(",").map(s => s.trim()).filter(s => s.length > 0);

            const payload = {
                name: name,
                experience: exp,
                workload: workload,
                skills: skills
            };

            try {
                const response = await fetch("http://localhost:8000/employees/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.detail || "Failed to add employee");
                }

                // Reset form and reload
                document.getElementById("employee-form").reset();
                document.getElementById("workload-display").textContent = "30%";
                document.getElementById("emp-workload").value = 30;
                
                await loadEmployees();
                showToast(`Employee "${name}" added successfully!`, "success");
                
            } catch (err) {
                console.error(err);
                showToast(`Error: ${err.message}`, "danger");
            }
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
